    --red: #C41E3A;
    --red-dark: #8B0000;
    --red-light: #E8394D;
    --cream: #FDF8F2;
    --warm-white: #FEFCFA;
    --gold: #C9A84C;
    --gold-light: #F0D98A;
    --charcoal: #1C1C1C;
    --gray: #6B6B6B;
    --light-gray: #EDECE8;
    --new-badge: #2E7D32;
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Noto Sans KR’, sans-serif;
background: var(–cream);
color: var(–charcoal);
min-height: 100dvh;
}

/* ── HEADER ── */
header {
background: var(–red-dark);
padding: 20px 16px 16px;
text-align: center;
position: relative;
overflow: hidden;
}
header::before {
content: ‘’;
position: absolute;
inset: 0;
background: repeating-linear-gradient(
45deg,
transparent,
transparent 20px,
rgba(255,255,255,0.02) 20px,
rgba(255,255,255,0.02) 40px
);
}
.header-bib {
font-size: 40px;
line-height: 1;
margin-bottom: 4px;
}
.header-title {
font-family: ‘Noto Serif KR’, serif;
font-size: 22px;
font-weight: 700;
color: #fff;
letter-spacing: -0.5px;
}
.header-sub {
font-size: 12px;
color: rgba(255,255,255,0.65);
margin-top: 4px;
letter-spacing: 1.5px;
text-transform: uppercase;
}
.header-badge {
display: inline-flex;
align-items: center;
gap: 6px;
background: var(–gold);
color: var(–charcoal);
font-size: 11px;
font-weight: 700;
padding: 4px 12px;
border-radius: 20px;
margin-top: 10px;
}

/* ── STATS ── */
.stats-bar {
display: flex;
background: var(–charcoal);
color: #fff;
}
.stat {
flex: 1;
text-align: center;
padding: 10px 8px;
border-right: 1px solid rgba(255,255,255,0.1);
}
.stat:last-child { border-right: none; }
.stat-num {
font-family: ‘Noto Serif KR’, serif;
font-size: 20px;
font-weight: 700;
color: var(–gold-light);
line-height: 1;
}
.stat-label {
font-size: 10px;
color: rgba(255,255,255,0.5);
margin-top: 2px;
}

/* ── FILTER TABS ── */
.filter-section {
background: var(–warm-white);
border-bottom: 1px solid var(–light-gray);
padding: 12px 16px 0;
}
.filter-label {
font-size: 10px;
font-weight: 700;
color: var(–gray);
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 8px;
}
.filter-scroll {
display: flex;
gap: 6px;
overflow-x: auto;
padding-bottom: 12px;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-chip {
flex-shrink: 0;
display: flex;
align-items: center;
gap: 4px;
background: var(–light-gray);
color: var(–charcoal);
font-size: 12px;
font-weight: 500;
padding: 6px 14px;
border-radius: 20px;
cursor: pointer;
border: 1.5px solid transparent;
transition: all 0.15s;
font-family: ‘Noto Sans KR’, sans-serif;
}
.filter-chip.active {
background: var(–red);
color: #fff;
border-color: var(–red-dark);
}

/* ── MAP ── */
#map {
height: 280px;
width: 100%;
z-index: 1;
border-bottom: 3px solid var(–red);
}

/* Custom Leaflet Marker */
.custom-marker {
width: 28px; height: 28px;
background: var(–red);
border-radius: 50% 50% 50% 0;
transform: rotate(-45deg);
border: 2px solid #fff;
box-shadow: 0 2px 6px rgba(0,0,0,0.3);
display: flex; align-items: center; justify-content: center;
cursor: pointer;
transition: transform 0.15s;
}
.custom-marker.new-marker { background: var(–new-badge); }
.custom-marker:hover { transform: rotate(-45deg) scale(1.2); }
.marker-inner {
transform: rotate(45deg);
font-size: 10px;
color: #fff;
font-weight: 700;
line-height: 1;
}

/* ── RESTAURANT LIST ── */
.list-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 16px 10px;
background: var(–warm-white);
border-bottom: 1px solid var(–light-gray);
position: sticky;
top: 0;
z-index: 10;
box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.list-header-title {
font-family: ‘Noto Serif KR’, serif;
font-size: 15px;
font-weight: 700;
color: var(–charcoal);
}
.result-count {
font-size: 12px;
color: var(–gray);
background: var(–light-gray);
padding: 3px 10px;
border-radius: 12px;
}

.restaurant-list {
padding: 12px 16px;
display: flex;
flex-direction: column;
gap: 10px;
}

.restaurant-card {
background: #fff;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 1px 6px rgba(0,0,0,0.07);
border: 1px solid rgba(0,0,0,0.05);
cursor: pointer;
transition: all 0.15s;
animation: fadeIn 0.25s ease both;
}
.restaurant-card:active { transform: scale(0.98); }
.restaurant-card.highlighted {
border: 2px solid var(–red);
box-shadow: 0 3px 16px rgba(196,30,58,0.2);
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

.card-main {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 14px;
}
.card-icon {
width: 44px; height: 44px;
border-radius: 10px;
background: var(–red-dark);
display: flex; align-items: center; justify-content: center;
font-size: 20px;
flex-shrink: 0;
}
.card-info { flex: 1; min-width: 0; }
.card-name {
font-family: ‘Noto Serif KR’, serif;
font-size: 15px;
font-weight: 700;
color: var(–charcoal);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.card-meta {
display: flex;
align-items: center;
gap: 6px;
margin-top: 3px;
flex-wrap: wrap;
}
.card-district {
font-size: 11px;
color: var(–gray);
display: flex; align-items: center; gap: 2px;
}
.card-category {
font-size: 11px;
background: var(–light-gray);
color: var(–charcoal);
padding: 1px 8px;
border-radius: 8px;
}
.badge-new {
font-size: 10px;
font-weight: 700;
background: var(–new-badge);
color: #fff;
padding: 1px 7px;
border-radius: 8px;
letter-spacing: 0.5px;
}
.card-price {
font-size: 11px;
color: var(–red);
font-weight: 700;
}

.card-expand {
border-top: 1px solid var(–light-gray);
padding: 10px 14px;
background: #FAFAF8;
display: none;
}
.card-expand.open { display: block; }
.card-address {
font-size: 12px;
color: var(–gray);
line-height: 1.6;
display: flex;
align-items: flex-start;
gap: 6px;
}
.card-menu {
margin-top: 6px;
font-size: 12px;
color: var(–charcoal);
font-style: italic;
}
.map-btn {
display: inline-flex;
align-items: center;
gap: 4px;
margin-top: 8px;
background: var(–red);
color: #fff;
font-size: 11px;
font-weight: 700;
padding: 6px 14px;
border-radius: 8px;
text-decoration: none;
font-family: ‘Noto Sans KR’, sans-serif;

/* ── EMPTY STATE ── */
.empty-state {
text-align: center;
padding: 50px 20px;
color: var(–gray);
}
.empty-state p { font-size: 14px; margin-top: 8px; }

/* ── FOOTER ── */
footer {
background: var(–charcoal);
color: rgba(255,255,255,0.5);
text-align: center;
padding: 20px 16px;
font-size: 11px;
line-height: 1.8;
margin-top: 20px;

border-radius: 10px !important;

font-family: ‘Noto Sans KR’, sans-serif !important;

.popup-name {

font-size: 14px;
font-weight: 700;
color: var(–charcoal);

.popup-info {
font-size: 11px;
color: var(–gray);
margin-top: 3px;
}
.popup-cat {
display: inline-block;
background: var(–red);
color: #fff;
font-size: 10px;
padding: 1px 6px;
border-radius: 6px;
margin-top: 4px;
}
</style>

  // ─── 용산·이태원 ───
  { id:27, name:"능동미나리",   district:"용산·이태원", area:"용산구", cat:"국물요리", icon:"🌿", tags:["국물"], lat:37.5318, lng:126.9984, address:"서울 용산구 이태원로 21길", menu:"능동미나리곰탕", isNew:false },
  { id:28, name:"이태원갈비",   district:"용산·이태원", area:"용산구", cat:"육류",   icon:"🥩", tags:["육류"], lat:37.5347, lng:126.9996, address:"서울 용산구 이태원로 180", menu:"LA갈비, 갈비탕", isNew:false },

  // ─── 기타 ───
  { id:29, name:"옥돌현옥",     district:"기타", area:"마포구", cat:"냉면",     icon:"🍜", tags:["냉면","면"], lat:37.5476, lng:126.9158, address:"서울 마포구 합정동", menu:"메밀 순면 냉면", isNew:false },
  { id:30, name:"고사리 익스프레스", district:"기타", area:"중구", cat:"비건",  icon:"🌱", tags:["비건"], lat:37.5618, lng:127.0106, address:"서울 중구 신당중앙시장", menu:"고사리 비건 요리", isNew:true },
  { id:31, name:"유한",         district:"기타", area:"성동구", cat:"한식",     icon:"🍱", tags:["한식"], lat:37.5474, lng:127.0399, address:"서울 성동구 성수이로", menu:"유한 한정식", isNew:false },
  { id:32, name:"능동치킨",     district:"기타", area:"광진구", cat:"육류",     icon:"🍗", tags:["육류"], lat:37.5481, lng:127.0828, address:"서울 광진구 능동로 90", menu:"숯불닭구이", isNew:false },
];

const EMOJIS = { "냉면":"❄️", "국물요리":"🍲", "육류":"🥩", "면류":"🍜", "한식":"🍱", "중식":"🥢", "비건":"🌱", "기타":"🍴" };

// ── Map Init ──
const map = L.map('map', { zoomControl:true, attributionControl:true })
  .setView([37.5500, 126.9800], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap contributors',
  maxZoom:18
}).addTo(map);

let markers = {};
let activeFilter = 'all';
let activeCard = null;

function createMarkerIcon(r) {
  return L.divIcon({
    className:'',
    html:`<div class="custom-marker ${r.isNew ? 'new-marker' : ''}">
            <div class="marker-inner">${r.icon}</div>
          </div>`,
    iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-30]
  });
}

RESTAURANTS.forEach(r => {
  const marker = L.marker([r.lat, r.lng], { icon: createMarkerIcon(r) });
  marker.bindPopup(`
    <div style="min-width:130px">
      <div class="popup-name">${r.name}</div>
      <div class="popup-info">📍 ${r.area} · ${r.menu}</div>
      <span class="popup-cat">${r.cat}</span>
      ${r.isNew ? '<span class="popup-cat" style="background:#2E7D32;margin-left:4px">NEW 2026</span>' : ''}
    </div>`, { maxWidth:180 });
  marker.on('click', () => scrollToCard(r.id));
  markers[r.id] = marker;
  marker.addTo(map);
});

// ── Filter ──
function getFiltered() {
  if (activeFilter === 'all') return RESTAURANTS;
  if (activeFilter === 'new') return RESTAURANTS.filter(r => r.isNew);
  if (['냉면','국물','육류','면','비건'].some(t => t === activeFilter))
    return RESTAURANTS.filter(r => r.tags.includes(activeFilter));
  return RESTAURANTS.filter(r => r.district === activeFilter);
}

document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderList();
    updateMapMarkers();
  });
});

function updateMapMarkers() {
  const visible = new Set(getFiltered().map(r => r.id));
  Object.entries(markers).forEach(([id, marker]) => {
    if (visible.has(Number(id))) {
      if (!map.hasLayer(marker)) marker.addTo(map);
    } else {
      if (map.hasLayer(marker)) map.removeLayer(marker);
    }
  });
  const filtered = getFiltered();
  if (filtered.length > 0) {
    const group = L.featureGroup(filtered.map(r => markers[r.id]).filter(Boolean));
    map.fitBounds(group.getBounds().pad(0.15), { maxZoom:15 });
  }
}

// ── Render ──
function renderList() {
  const list = getFiltered();
  const container = document.getElementById('restaurantList');
  document.getElementById('resultCount').textContent = `${list.length}곳 표시`;
  container.innerHTML = '';

  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><div style="font-size:40px">🔍</div><p>선택한 필터에 해당하는 식당이 없습니다</p></div>`;
    return;
  }

  list.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'restaurant-card';
    card.dataset.id = r.id;
    card.style.animationDelay = `${i * 30}ms`;
    card.innerHTML = `
      <div class="card-main" onclick="toggleCard(${r.id})">
        <div class="card-icon">${r.icon}</div>
        <div class="card-info">
          <div class="card-name">${r.name}</div>
          <div class="card-meta">
            <span class="card-district">📍 ${r.area}</span>
            <span class="card-category">${r.cat}</span>
            ${r.isNew ? '<span class="badge-new">NEW 2026</span>' : ''}
          </div>
        </div>
        <div class="card-price">₩45K↓</div>
      </div>
      <div class="card-expand" id="expand-${r.id}">
        <div class="card-address">
          <span>🏠</span>
          <span>${r.address}</span>
        </div>
        <div class="card-menu">대표메뉴: ${r.menu}</div>
        <a class="map-btn" href="#" onclick="focusMap(${r.id}, event)">🗺 지도에서 보기</a>
      </div>`;
    container.appendChild(card);
  });
}

function toggleCard(id) {
  const expand = document.getElementById(`expand-${id}`);
  const card = document.querySelector(`.restaurant-card[data-id="${id}"]`);
  const isOpen = expand.classList.contains('open');

  // Close all
  document.querySelectorAll('.card-expand').forEach(e => e.classList.remove('open'));
  document.querySelectorAll('.restaurant-card').forEach(c => c.classList.remove('highlighted'));

  if (!isOpen) {
    expand.classList.add('open');
    card.classList.add('highlighted');
    focusMapSilent(id);
  }
}

function focusMapSilent(id) {
  const r = RESTAURANTS.find(x => x.id === id);
  if (r && markers[id]) {
    map.setView([r.lat, r.lng], 15, { animate:true });
    markers[id].openPopup();
  }
}

function focusMap(id, e) {
  e.preventDefault();
  focusMapSilent(id);
  document.getElementById('map').scrollIntoView({ behavior:'smooth', block:'start' });
}

function scrollToCard(id) {
  const card = document.querySelector(`.restaurant-card[data-id="${id}"]`);
  if (card) {
    card.scrollIntoView({ behavior:'smooth', block:'center' });
    toggleCard(id);
  }
}

// ── Init ──
renderList();
</script>
